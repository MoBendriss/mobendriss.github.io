<!DOCTYPE html>
<html lang="fr" dir="ltr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoBendriss | Mathématiques</title>
    
    <!-- الأيقونات والخطوط -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- مكتبة الرياضيات -->
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root {
            --bg: #FBF8F2; --text: #132038; --card: #FFFFFF;
            --accent: #2C6E8E; --focus: #E7A947; --border: #E4DFCF;
        }
        [data-theme="dark"] {
            --bg: #0B1526; --text: #FBF8F2; --card: #132038;
            --border: #1D2A44;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; transition: 0.3s; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        
        /* الهيدر */
        header { background: #101C33; color: white; padding: 40px 20px; text-align: center; }
        .controls { margin-top: 20px; display: flex; justify-content: center; gap: 10px; }
        input { padding: 10px; border-radius: 20px; border: none; width: 250px; }
        button.theme-btn { padding: 10px 20px; border-radius: 20px; border: none; cursor: pointer; background: var(--focus); }

        /* التبويبات */
        .nav-bar { display: flex; justify-content: center; gap: 20px; padding: 20px; border-bottom: 1px solid var(--border); }
        .nav-btn { cursor: pointer; background: none; border: none; color: var(--text); font-weight: 600; }
        
        /* المحتوى */
        .tab-content { display: none; margin-top: 30px; }
        .active-content { display: block; }
        .item { 
            background: var(--card); padding: 20px; margin-bottom: 10px; 
            border-radius: 8px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>MoBendriss</h1>
        <div class="controls">
            <input type="text" id="searchInput" placeholder="بحث..." onkeyup="filterContent()">
            <button class="theme-btn" onclick="toggleTheme()">الوضع</button>
        </div>
    </header>

    <nav class="nav-bar">
        <button class="nav-btn" onclick="switchTab('accueil')">الرئيسية</button>
        <button class="nav-btn" onclick="switchTab('l1')">السنة الأولى</button>
        <button class="nav-btn" onclick="switchTab('l2')">السنة الثانية</button>
    </nav>

    <main class="container">
        <div id="content-accueil" class="tab-content active-content">
            <h2>مرحباً بك</h2>
            <p>منصة تعليمية مخصصة لطلاب الرياضيات.</p>
        </div>

        <div id="content-l1" class="tab-content">
            <h2>دروس السنة الأولى</h2>
            <div class="item"><span>المتتاليات العددية</span> <i class="fa-solid fa-download"></i></div>
            <div class="item"><span>الجبر الخطي</span> <i class="fa-solid fa-download"></i></div>
        </div>

        <div id="content-l2" class="tab-content">
            <h2>دروس السنة الثانية</h2>
            <div class="item"><span>التحليل المركب</span> <i class="fa-solid fa-download"></i></div>
        </div>
    </main>

    <script>
        function toggleTheme() {
            const h = document.documentElement;
            h.setAttribute('data-theme', h.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active-content'));
            document.getElementById('content-' + id).classList.add('active-content');
        }

        function filterContent() {
            let val = document.getElementById('searchInput').value.toLowerCase();
            document.querySelectorAll('.item').forEach(i => {
                i.style.display = i.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
            });
        }
    </script>
</body>
</html>
